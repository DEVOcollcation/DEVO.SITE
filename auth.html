<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEVO | تسجيل الدخول</title>
    <link rel="icon" type="image/png" href="../../src/assets/icons/dv.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="DEVO">
<link rel="apple-touch-icon" href="./src/assets/icons/dv.png">

<script>
  // تسجيل الـ Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('DEVO PWA Ready!', reg))
        .catch(err => console.log('PWA Error:', err));
    });
  }
</script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        devo: {
                            black: '#0a0a0a', dark: '#171717', gray: '#262626',
                            orange: '#f97316', orangeHover: '#ea580c',
                            text: '#f5f5f5', muted: '#a3a3a3',
                            success: '#10b981', error: '#ef4444'
                        }
                    },
                    fontFamily: { sans: ['Tajawal', 'sans-serif'] },
                    boxShadow: { 'devo-float': '0 10px 40px -10px rgba(0,0,0,0.8)' }
                }
            }
        }
    </script>
    
    <style> body { font-family: 'Tajawal', sans-serif; } </style>
</head>
<body class="bg-devo-black min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-devo-orange/5 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="w-full max-w-md bg-devo-dark border border-devo-gray rounded-2xl p-8 shadow-2xl relative z-10">
        
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold tracking-wider text-white mb-2">
                D<span class="text-devo-orange">E</span>VO
            </h1>
            <p class="text-devo-muted text-sm font-medium">نظام إدارة المبيعات والمخازن</p>
        </div>

        <form id="auth-form" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-devo-muted mb-2">اسم المستخدم</label>
                <div class="relative">
                    <i class="ph ph-user absolute right-4 top-1/2 -translate-y-1/2 text-xl text-devo-muted"></i>
                    <input type="text" id="username" required autocomplete="off"
                        class="w-full bg-devo-black border border-devo-gray rounded-lg pr-12 pl-4 py-3 text-white focus:outline-none focus:border-devo-orange transition-colors"
                        placeholder="أدخل اسم المستخدم" dir="ltr" style="text-align: right;">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-devo-muted mb-2">كلمة المرور</label>
                <div class="relative">
                    <i class="ph ph-lock-key absolute right-4 top-1/2 -translate-y-1/2 text-xl text-devo-muted"></i>
                    <input type="password" id="password" required autocomplete="current-password"
                        class="w-full bg-devo-black border border-devo-gray rounded-lg pr-12 pl-4 py-3 text-white focus:outline-none focus:border-devo-orange transition-colors"
                        placeholder="أدخل كلمة المرور" dir="ltr" style="text-align: right;">
                </div>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-devo-orange hover:bg-devo-orangeHover text-white font-bold py-3.5 rounded-lg transition-colors flex justify-center items-center gap-2 mt-4 shadow-lg shadow-devo-orange/20">
                <span id="btn-text">تسجيل الدخول</span>
                <i id="btn-icon" class="ph ph-sign-in text-xl"></i>
            </button>
        </form>
    </div>

    <div id="toast-container" class="fixed bottom-6 left-6 z-[500] flex flex-col gap-3 pointer-events-none"></div>

    <script type="module">
        import { loginUser, getCurrentSession } from './src/js/services/auth.js';
        import { showToast } from './src/js/components/toast.js';

        const form = document.getElementById('auth-form');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnIcon = document.getElementById('btn-icon');

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            const { session } = getCurrentSession();
            if (session && session.user) {
                const role = session.user.role;
                window.location.href = (role === 'admin' || role === 'owner') ? 'admin.html' : 'index.html';
            }
        });

        // Handle Login Submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            // Set Loading State
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
            btnText.textContent = 'جاري التحقق...';
            btnIcon.className = 'ph ph-spinner animate-spin text-xl';

            // Attempt Login
            const { user, error } = await loginUser(username, password);

            if (error) {
                // Reset UI on error
                showToast(error.message || 'بيانات الدخول غير صحيحة.', 'error');
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                btnText.textContent = 'تسجيل الدخول';
                btnIcon.className = 'ph ph-sign-in text-xl';
            } else {
                // Success route
                showToast('تم تسجيل الدخول بنجاح، جاري التوجيه...', 'success');
                
                setTimeout(() => {
                    const role = user.role;
                    window.location.href = (role === 'admin' || role === 'owner') ? 'admin.html' : 'index.html';
                }, 1000);
            }
        });
    </script>
</body>
</html>
